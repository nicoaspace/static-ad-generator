name: static-ad-generator

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip

  # image handling
  - pillow

  - pip:
      # Google AI Studio / Gemini API (Nano Banana 2)
      - google-genai

      # AVIF support for Pillow (packaging image conversion)
      - pillow-avif-plugin

      # Phase 1 & 2: Claude API for brand research + prompt generation
      - anthropic

      # Phase 1: JS-rendered web scraping for brand sites
      - playwright
